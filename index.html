<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Подготовка к экзамену</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
:root{
  --sidebar-bg:#17212b;--sidebar-header:#242f3d;--chat-bg:#0e1621;
  --chat-header:#17212b;--msg-own:#2b5278;--msg-other:#182533;
  --msg-own-text:#fff;--msg-other-text:#fff;--text-primary:#f5f5f5;
  --text-secondary:#6d7f8f;--accent:#5288c1;--accent-hover:#4578ab;
  --input-bg:#242f3d;--hover:#2b3a4a;--modal-bg:#232e3c;
  --overlay:rgba(0,0,0,.6);--divider:#1a2634;--time:#7b8e9f;
  --danger:#e53935;--radius:12px;--placeholder:#6d7f8f;
  --scrollbar:#3a4a5a;--separator:rgba(0,0,0,.35)
}
[data-theme="light"]{
  --sidebar-bg:#fff;--sidebar-header:#517da2;--chat-bg:#c8d7e0;
  --chat-header:#517da2;--msg-own:#eeffde;--msg-other:#fff;
  --msg-own-text:#000;--msg-other-text:#000;--text-primary:#000;
  --text-secondary:#707579;--accent:#3390ec;--accent-hover:#2b7dd6;
  --input-bg:#fff;--hover:#f0f2f5;--modal-bg:#fff;
  --overlay:rgba(0,0,0,.4);--divider:#e0e0e0;--time:#8e9ba7;
  --danger:#e53935;--placeholder:#9e9e9e;--scrollbar:#c4c4c4;
  --separator:rgba(0,0,0,.15)
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--chat-bg);color:var(--text-primary);transition:background .3s,color .3s}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}

/* ── APP LAYOUT ── */
.app{display:flex;height:100vh;width:100%}
.sidebar{width:360px;min-width:360px;background:var(--sidebar-bg);display:flex;
  flex-direction:column;border-right:1px solid var(--divider);position:relative;z-index:50}
.sidebar-header{background:var(--sidebar-header);padding:10px 16px;display:flex;
  align-items:center;justify-content:space-between;min-height:56px}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar-small{width:38px;height:38px;border-radius:50%;object-fit:cover;cursor:pointer}
.user-name-display{font-size:14px;font-weight:600;color:#fff}
.header-actions{display:flex;gap:4px}
.icon-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;
  width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;transition:background .2s}
.icon-btn:hover{background:rgba(255,255,255,.1)}

.search-box{padding:6px 10px}
.search-box input{width:100%;padding:8px 14px;border-radius:20px;border:none;
  background:var(--input-bg);color:var(--text-primary);font-size:14px;outline:none}
.search-box input::placeholder{color:var(--placeholder)}

.pages-list{flex:1;overflow-y:auto}
.page-item{display:flex;align-items:center;padding:9px 14px;cursor:pointer;
  transition:background .15s;gap:12px;position:relative}
.page-item:hover{background:var(--hover)}
.page-item.active{background:var(--accent) !important}
.page-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.page-info{flex:1;overflow:hidden}
.page-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-item.active .page-name{color:#fff}
.page-date{font-size:12px;color:var(--text-secondary);margin-top:2px}
.page-item.active .page-date{color:rgba(255,255,255,.7)}

.fab{position:absolute;bottom:20px;right:20px;width:54px;height:54px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;font-size:28px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.35);transition:background .2s,transform .15s;z-index:10}
.fab:hover{background:var(--accent-hover);transform:scale(1.05)}

/* ── CHAT AREA ── */
.chat-area{flex:1;display:flex;flex-direction:column;background:var(--chat-bg);min-width:0}
.chat-header{background:var(--chat-header);padding:10px 20px;display:flex;align-items:center;
  min-height:56px;gap:12px;border-bottom:1px solid var(--divider)}
.chat-back{display:none;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;
  margin-right:4px;padding:6px}
.chat-title{font-size:16px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.messages-wrap{flex:1;overflow-y:auto;padding:10px 10%;display:flex;flex-direction:column}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text-secondary);text-align:center;gap:12px}
.welcome-icon{font-size:64px;opacity:.5}
.welcome h2{font-size:20px;font-weight:500}
.welcome p{font-size:14px;max-width:320px}

.date-sep{text-align:center;padding:10px 0}
.date-sep span{background:var(--separator);color:#fff;padding:4px 12px;border-radius:12px;
  font-size:13px}
[data-theme="light"] .date-sep span{color:#fff;background:rgba(0,0,0,.25)}

.message{display:flex;margin:2px 0;position:relative}
.message.own{justify-content:flex-end}
.message.other{justify-content:flex-start}
.msg-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;margin-top:auto;
  margin-right:8px;flex-shrink:0;cursor:pointer}
.message.own .msg-avatar{display:none}
.bubble{max-width:420px;padding:7px 11px 5px;border-radius:var(--radius);position:relative;
  word-wrap:break-word;line-height:1.45;font-size:14.5px;min-width:80px}
.message.own .bubble{background:var(--msg-own);color:var(--msg-own-text);
  border-bottom-right-radius:4px}
.message.other .bubble{background:var(--msg-other);color:var(--msg-other-text);
  border-bottom-left-radius:4px}
.msg-author{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:2px}
.message.own .msg-author{display:none}
.msg-text{white-space:pre-wrap}
.msg-image{max-width:320px;border-radius:8px;cursor:pointer;display:block;margin:4px 0}
.msg-video{max-width:320px;border-radius:8px;display:block;margin:4px 0}
.msg-meta{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:3px}
.msg-time{font-size:11px;color:var(--time)}
.msg-edited{font-size:11px;color:var(--time);font-style:italic}
.msg-edit-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;
  border-radius:4px;color:var(--time);opacity:0;transition:opacity .2s}
.bubble:hover .msg-edit-btn{opacity:1}
.msg-edit-btn:hover{color:var(--accent)}

/* ── VOICE PLAYER ── */
.voice-player{display:flex;align-items:center;gap:8px;min-width:200px;padding:4px 0}
.vp-play{width:34px;height:34px;border-radius:50%;background:var(--accent);border:none;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;transition:background .2s}
.vp-play:hover{background:var(--accent-hover)}
.vp-bar-wrap{flex:1;height:28px;display:flex;align-items:center;cursor:pointer;position:relative}
.vp-bar{width:100%;height:3px;background:rgba(255,255,255,.15);border-radius:2px}
[data-theme="light"] .vp-bar{background:rgba(0,0,0,.12)}
.vp-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .05s}
.vp-time{font-size:12px;color:var(--time);min-width:36px;text-align:right}

/* ── INPUT AREA ── */
.input-area{padding:8px 10%;background:var(--chat-header);display:flex;align-items:flex-end;gap:8px;
  border-top:1px solid var(--divider)}
.input-area.hidden{display:none}
.ia-btn{width:40px;height:40px;border-radius:50%;background:none;border:none;color:var(--text-secondary);
  font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:color .2s}
.ia-btn:hover{color:var(--accent)}
.ia-btn.send-active{color:var(--accent)}
.ia-btn.recording{color:var(--danger);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
textarea.msg-input{flex:1;padding:9px 14px;border-radius:18px;border:none;background:var(--input-bg);
  color:var(--text-primary);font-size:14.5px;resize:none;max-height:140px;outline:none;
  font-family:inherit;line-height:1.4;min-height:40px;height:40px}
textarea.msg-input::placeholder{color:var(--placeholder)}
.rec-indicator{display:flex;align-items:center;gap:10px;flex:1;color:var(--danger);font-size:14px}
.rec-dot{width:10px;height:10px;border-radius:50%;background:var(--danger);animation:pulse 1s infinite}
.file-hidden{display:none}

/* ── MODALS ── */
.modal-overlay{display:none;position:fixed;inset:0;background:var(--overlay);z-index:1000;
  justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:var(--modal-bg);border-radius:12px;padding:28px;width:90%;max-width:380px;
  box-shadow:0 8px 40px rgba(0,0,0,.4);animation:modalIn .2s ease-out}
@keyframes modalIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.modal h2{font-size:18px;margin-bottom:18px;text-align:center}
.modal-input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--divider);
  background:var(--input-bg);color:var(--text-primary);font-size:14px;outline:none;margin-bottom:12px}
.modal-input:focus{border-color:var(--accent)}
.modal-btn{width:100%;padding:11px;border-radius:10px;border:none;background:var(--accent);
  color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.modal-btn:hover{background:var(--accent-hover)}
.modal-btn.secondary{background:transparent;color:var(--text-secondary);margin-top:6px}
.modal-btn.secondary:hover{color:var(--text-primary)}

.avatar-upload{display:flex;flex-direction:column;align-items:center;margin-bottom:18px;gap:10px}
.avatar-preview{width:90px;height:90px;border-radius:50%;object-fit:cover;
  background:var(--input-bg);cursor:pointer;border:2px solid var(--divider)}
.avatar-label{color:var(--accent);font-size:13px;cursor:pointer}
.avatar-label:hover{text-decoration:underline}

.edit-textarea{width:100%;min-height:80px;padding:10px;border-radius:10px;border:1px solid var(--divider);
  background:var(--input-bg);color:var(--text-primary);font-size:14px;outline:none;
  resize:vertical;font-family:inherit;margin-bottom:12px}
.edit-textarea:focus{border-color:var(--accent)}

/* ── IMAGE VIEWER ── */
.img-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;
  cursor:pointer;justify-content:center;align-items:center}
.img-viewer.show{display:flex}
.img-viewer img{max-width:92%;max-height:92%;object-fit:contain;border-radius:4px}

/* ── RESPONSIVE ── */
@media(max-width:800px){
  .sidebar{width:100%;min-width:100%}
  .chat-area{position:fixed;inset:0;z-index:100;display:none}
  .chat-area.mob-open{display:flex}
  .chat-back{display:flex !important}
  .messages-wrap{padding:10px 4%}
  .input-area{padding:8px 3%}
}
</style>
</head>
<body>

<!-- ═══ PROFILE MODAL ═══ -->
<div class="modal-overlay" id="profileOverlay">
<div class="modal">
  <h2>👋 Добро пожаловать</h2>
  <div class="avatar-upload">
    <img class="avatar-preview" id="avatarPreview" src="" alt="Аватар">
    <label class="avatar-label" for="avatarFile">Загрузить фото</label>
    <input type="file" id="avatarFile" accept="image/*" class="file-hidden">
  </div>
  <input class="modal-input" id="profName" placeholder="Имя" autocomplete="off">
  <input class="modal-input" id="profSurname" placeholder="Фамилия" autocomplete="off">
  <button class="modal-btn" id="profSave">Начать</button>
</div></div>

<!-- ═══ NEW PAGE MODAL ═══ -->
<div class="modal-overlay" id="newPageOverlay">
<div class="modal">
  <h2>📄 Новая страница</h2>
  <input class="modal-input" id="newPageName" placeholder="Название (например: Задание 1)" autocomplete="off">
  <button class="modal-btn" id="newPageCreate">Создать</button>
  <button class="modal-btn secondary" id="newPageCancel">Отмена</button>
</div></div>

<!-- ═══ EDIT MODAL ═══ -->
<div class="modal-overlay" id="editOverlay">
<div class="modal">
  <h2>✏️ Редактировать</h2>
  <textarea class="edit-textarea" id="editText"></textarea>
  <button class="modal-btn" id="editSave">Сохранить</button>
  <button class="modal-btn secondary" id="editCancel">Отмена</button>
</div></div>

<!-- ═══ IMAGE VIEWER ═══ -->
<div class="img-viewer" id="imgViewer" onclick="this.classList.remove('show')">
  <img id="imgViewerSrc" src="" alt="">
</div>

<!-- ═══ MAIN APP ═══ -->
<div class="app" id="app" style="display:none">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="user-info">
        <img class="user-avatar-small" id="sidebarAvatar" src="" alt="">
        <span class="user-name-display" id="sidebarName"></span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="themeBtn" title="Сменить тему">🌙</button>
      </div>
    </div>
    <div class="search-box"><input id="searchInput" placeholder="Поиск..." autocomplete="off"></div>
    <div class="pages-list" id="pagesList"></div>
    <button class="fab" id="fabBtn" title="Новая страница">+</button>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="chat-header" id="chatHeader">
      <button class="chat-back" id="chatBack">←</button>
      <span class="chat-title" id="chatTitle">Подготовка к экзамену</span>
    </div>
    <div class="messages-wrap" id="messagesWrap">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">📚</div>
        <h2>Подготовка к экзамену</h2>
        <p>Выберите страницу слева или создайте новую, нажав «+»</p>
      </div>
    </div>
    <div class="input-area hidden" id="inputArea">
      <button class="ia-btn" id="attachBtn" title="Прикрепить файл">📎</button>
      <input type="file" id="fileInput" accept="image/*,video/*" class="file-hidden" multiple>
      <textarea class="msg-input" id="msgInput" placeholder="Написать сообщение..." rows="1"></textarea>
      <button class="ia-btn" id="voiceBtn" title="Голосовое сообщение">🎤</button>
      <button class="ia-btn send-active" id="sendBtn" title="Отправить" style="display:none">➤</button>
    </div>
  </div>
</div>

<!-- ═══ FIREBASE SDK ═══ -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// Умный выбор конфига (Превью Canvas vs Твой сервер)
const isCanvas = typeof __firebase_config !== 'undefined';
const fbConfig = isCanvas ? JSON.parse(__firebase_config) : {
  apiKey: "AIzaSyCDrk4TEP8u8U03tUzVY--67ZS8RVCblGQ",
  authDomain: "newchat-9a7e6.firebaseapp.com",
  projectId: "newchat-9a7e6",
  storageBucket: "newchat-9a7e6.firebasestorage.app",
  messagingSenderId: "22906415162",
  appId: "1:22906415162:web:97f2fb81bcf38ec0996d03",
  measurementId: "G-WNSMWYL6T9"
};
const envAppId = typeof __app_id !== 'undefined' ? __app_id : 'exam-prep-app';

// ── ИНИЦИАЛИЗАЦИЯ ──
let db, auth;
try {
  firebase.initializeApp(fbConfig);
  db = firebase.firestore();
  auth = firebase.auth();
  db.enablePersistence().catch(() => {});
} catch(e) {
  console.error('Firebase init error:', e);
}

// Умные роуты (позволяют работать в Canvas, но сохраняют твои старые чаты на твоем сервере)
function getPagesRef() {
  return isCanvas 
    ? db.collection('artifacts').doc(envAppId).collection('public').doc('data').collection('pages')
    : db.collection('pages');
}
function getMessagesRef(pageId) {
  return isCanvas
    ? getPagesRef().doc(pageId).collection('messages')
    : db.collection('pages').doc(pageId).collection('messages');
}

// ── СОСТОЯНИЕ ПРИЛОЖЕНИЯ ──
let currentUser = null;       // {id, name, avatar}
let currentPageId = null;
let messagesUnsub = null;     // onSnapshot unsubscribe
let mediaRecorder = null;
let audioChunks = [];
let recordingTimer = null;
let recordingSeconds = 0;
let allPages = [];            // для поиска

// ── DOM ЭЛЕМЕНТЫ ──
const $ = id => document.getElementById(id);
const app = $('app');
const profileOverlay = $('profileOverlay');
const profName = $('profName');
const profSurname = $('profSurname');
const profSave = $('profSave');
const avatarPreview = $('avatarPreview');
const avatarFile = $('avatarFile');
const sidebarAvatar = $('sidebarAvatar');
const sidebarName = $('sidebarName');
const themeBtn = $('themeBtn');
const searchInput = $('searchInput');
const pagesList = $('pagesList');
const fabBtn = $('fabBtn');
const newPageOverlay = $('newPageOverlay');
const newPageName = $('newPageName');
const newPageCreate = $('newPageCreate');
const newPageCancel = $('newPageCancel');
const chatArea = $('chatArea');
const chatBack = $('chatBack');
const chatTitle = $('chatTitle');
const messagesWrap = $('messagesWrap');
const welcomeScreen = $('welcomeScreen');
const inputArea = $('inputArea');
const attachBtn = $('attachBtn');
const fileInput = $('fileInput');
const msgInput = $('msgInput');
const voiceBtn = $('voiceBtn');
const sendBtn = $('sendBtn');
const editOverlay = $('editOverlay');
const editText = $('editText');
const editSave = $('editSave');
const editCancel = $('editCancel');
const imgViewer = $('imgViewer');
const imgViewerSrc = $('imgViewerSrc');

// ════════════════════════════════════════
// УТИЛИТЫ
// ════════════════════════════════════════
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
}

function getColor(str) {
  const c = ['#e17076','#7bc862','#e5ca77','#65aadd','#a695e7','#ee7aae','#6ec9cb','#faa774'];
  let h = 0;
  for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
  return c[Math.abs(h) % c.length];
}

function makeDefaultAvatar(name) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = 100;
  const cx = cv.getContext('2d');
  cx.fillStyle = getColor(name);
  cx.fillRect(0, 0, 100, 100);
  cx.fillStyle = '#fff';
  cx.font = 'bold 40px Arial';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  const ini = name.split(' ').map(w => w[0] || '').join('').toUpperCase().slice(0, 2);
  cx.fillText(ini || '?', 50, 52);
  return cv.toDataURL('image/png');
}

function compressImage(file, maxBytes = 850000) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const cv = document.createElement('canvas');
        let w = img.width, h = img.height;
        const MAX = 1200;
        if (w > MAX || h > MAX) {
          if (w > h) { h = (h / w) * MAX; w = MAX; }
          else { w = (w / h) * MAX; h = MAX; }
        }
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        let q = 0.75, result;
        do {
          result = cv.toDataURL('image/jpeg', q);
          q -= 0.08;
        } while (result.length > maxBytes && q > 0.1);
        if (result.length > maxBytes * 1.2) {
          const scale = 0.6;
          cv.width = w * scale; cv.height = h * scale;
          cv.getContext('2d').drawImage(img, 0, 0, w * scale, h * scale);
          result = cv.toDataURL('image/jpeg', 0.5);
        }
        resolve(result);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function compressAvatar(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const cv = document.createElement('canvas');
        cv.width = cv.height = 100;
        const s = Math.min(img.width, img.height);
        const sx = (img.width - s) / 2, sy = (img.height - s) / 2;
        cv.getContext('2d').drawImage(img, sx, sy, s, s, 0, 0, 100, 100);
        resolve(cv.toDataURL('image/jpeg', 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function getTs(obj) {
  if (!obj.createdAt) return Date.now(); // Для локальных сообщений, ожидающих отправки
  if (obj.createdAt.toMillis) return obj.createdAt.toMillis();
  return new Date(obj.createdAt).getTime();
}

function fmtTime(date) {
  if (!date) return 'Только что';
  const d = date instanceof Date ? date : date.toDate?.() || new Date(date);
  return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

function fmtDate(date) {
  if (!date) return 'Сегодня';
  const d = date instanceof Date ? date : date.toDate?.() || new Date(date);
  const now = new Date();
  const yest = new Date(now); yest.setDate(yest.getDate() - 1);
  if (d.toDateString() === now.toDateString()) return 'Сегодня';
  if (d.toDateString() === yest.toDateString()) return 'Вчера';
  return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
}

function fmtDuration(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return m + ':' + String(s).padStart(2, '0');
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ════════════════════════════════════════
// ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ
// ════════════════════════════════════════
function loadProfile() {
  const raw = localStorage.getItem('exam_user');
  if (raw) {
    try { currentUser = JSON.parse(raw); } catch { currentUser = null; }
  }
  return !!currentUser;
}

function saveProfile(name, avatar) {
  currentUser = {
    id: currentUser?.id || genId(),
    name: name,
    avatar: avatar || makeDefaultAvatar(name)
  };
  localStorage.setItem('exam_user', JSON.stringify(currentUser));
}

function showProfileUI() {
  sidebarAvatar.src = currentUser.avatar;
  sidebarName.textContent = currentUser.name;
}

let tempAvatar = null;
avatarFile.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  tempAvatar = await compressAvatar(file);
  avatarPreview.src = tempAvatar;
});

profName.addEventListener('input', () => {
  if (!tempAvatar) {
    const full = (profName.value.trim() + ' ' + profSurname.value.trim()).trim();
    if (full) avatarPreview.src = makeDefaultAvatar(full);
  }
});
profSurname.addEventListener('input', () => {
  if (!tempAvatar) {
    const full = (profName.value.trim() + ' ' + profSurname.value.trim()).trim();
    if (full) avatarPreview.src = makeDefaultAvatar(full);
  }
});

profSave.addEventListener('click', async () => {
  const name = (profName.value.trim() + ' ' + profSurname.value.trim()).trim();
  if (!name) { profName.focus(); return; }
  saveProfile(name, tempAvatar);

  document.documentElement.setAttribute('data-theme', t);

// ════════════════════════════════════════
// FIREBASE AUTH & FIRESTORE
// ════════════════════════════════════════
async function authFirebaseAndInit() {
  if (!auth) return;
  try {
    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
      await auth.signInWithCustomToken(__initial_auth_token);
    } else {
      await auth.signInAnonymously();
    }
    initFirestore();
  } catch(e) {
    console.error('Auth error', e);
  }
}

function initFirestore() {
  if (!db) return;
  // Слушаем список страниц (сортировка в памяти для безопасности)
  getPagesRef().onSnapshot(snap => {
    allPages = [];
    snap.forEach(doc => {
      allPages.push({ id: doc.id, ...doc.data() });
    });
    
    // Сортировка по времени создания
    allPages.sort((a, b) => getTs(a) - getTs(b));
    renderPages(allPages);
  }, err => console.error('Pages listener error:', err));
}

function renderPages(pages) {
  const filter = searchInput.value.trim().toLowerCase();
  const filtered = filter ? pages.filter(p => p.name.toLowerCase().includes(filter)) : pages;

  pagesList.innerHTML = '';
  filtered.forEach(p => {
    const div = document.createElement('div');
    div.className = 'page-item' + (currentPageId === p.id ? ' active' : '');
    const color = getColor(p.name);
    const letter = (p.name[0] || '?').toUpperCase();
    const dateStr = p.createdAt ? fmtDate(p.createdAt) : 'Только что';
    div.innerHTML = `
      <div class="page-icon" style="background:${color}">${letter}</div>
      <div class="page-info">
        <div class="page-name">${escapeHtml(p.name)}</div>
        <div class="page-date">${dateStr}</div>
      </div>`;
    div.addEventListener('click', () => selectPage(p.id, p.name));
    pagesList.appendChild(div);
  });
}

searchInput.addEventListener('input', () => renderPages(allPages));

// Создание новой страницы
fabBtn.addEventListener('click', () => {
  newPageName.value = '';
  newPageOverlay.classList.add('show');
  setTimeout(() => newPageName.focus(), 100);
});

newPageCancel.addEventListener('click', () => newPageOverlay.classList.remove('show'));
newPageOverlay.addEventListener('click', e => {
  if (e.target === newPageOverlay) newPageOverlay.classList.remove('show');
});

newPageCreate.addEventListener('click', createPage);
newPageName.addEventListener('keydown', e => { if (e.key === 'Enter') createPage(); });

function createPage() {
  const name = newPageName.value.trim();
  if (!name || !db) return;
  getPagesRef().add({
    name: name,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    newPageOverlay.classList.remove('show');
  }).catch(err => {
    console.error('Create page error:', err);
    alert('Ошибка создания страницы. Проверьте правила Firebase Rules.');
  });
}

// ════════════════════════════════════════
// ВЫБОР СТРАНИЦЫ И СООБЩЕНИЯ
// ════════════════════════════════════════
function selectPage(pageId, pageName) {
  currentPageId = pageId;
  chatTitle.textContent = pageName;
  welcomeScreen.style.display = 'none';
  inputArea.classList.remove('hidden');

  // Обновляем active в sidebar
  document.querySelectorAll('.page-item').forEach((el, i) => {
    el.classList.toggle('active', allPages[i]?.id === pageId);
  });
  renderPages(allPages);

  // Мобильная версия: показать чат
  chatArea.classList.add('mob-open');

  // Отписываемся от предыдущих сообщений
  if (messagesUnsub) messagesUnsub();

  messagesWrap.innerHTML = '';
  let prevCount = 0;

  messagesUnsub = getMessagesRef(pageId).onSnapshot(snap => {
      const wasBottom = messagesWrap.scrollTop + messagesWrap.clientHeight >= messagesWrap.scrollHeight - 80;
      messagesWrap.innerHTML = '';

      let msgs = [];
      snap.forEach(doc => msgs.push({ id: doc.id, ...doc.data() }));
      
      // Сортировка в памяти
      msgs.sort((a, b) => getTs(a) - getTs(b));

      let lastDateStr = null;
      msgs.forEach(d => {
        const ts = d.createdAt?.toDate?.() || null;
        if (ts) {
          const ds = ts.toDateString();
          if (ds !== lastDateStr) {
            lastDateStr = ds;
            const sep = document.createElement('div');
            sep.className = 'date-sep';
            sep.innerHTML = `<span>${fmtDate(ts)}</span>`;
            messagesWrap.appendChild(sep);
          }
        }
        messagesWrap.appendChild(buildMessage(d.id, d));
      });

      const newCount = msgs.length;
      if (wasBottom || newCount > prevCount) {
        setTimeout(() => { messagesWrap.scrollTop = messagesWrap.scrollHeight; }, 30);
      }
      prevCount = newCount;
    }, err => console.error('Messages error:', err));
}

function buildMessage(msgId, data) {
  const isOwn = data.authorId === currentUser.id;
  const div = document.createElement('div');
  div.className = 'message ' + (isOwn ? 'own' : 'other');
  div.id = 'msg-' + msgId;

  let avatarHtml = '';
  if (!isOwn) {
    const avSrc = data.authorAvatar || makeDefaultAvatar(data.authorName || '?');
    avatarHtml = `<img class="msg-avatar" src="${avSrc}" alt="" title="${escapeHtml(data.authorName || '')}">`;
  }

  let contentHtml = '';
  const type = data.type || 'text';

  if (type === 'text') {
    contentHtml = `<div class="msg-text">${escapeHtml(data.content || '')}</div>`;
  } else if (type === 'image') {
    contentHtml = `<img class="msg-image" src="${data.content}" alt="Фото" onclick="openImage(this.src)">`
      + (data.caption ? `<div class="msg-text">${escapeHtml(data.caption)}</div>` : '');
  } else if (type === 'video') {
    contentHtml = `<video class="msg-video" src="${data.content}" controls preload="metadata"></video>`
      + (data.caption ? `<div class="msg-text">${escapeHtml(data.caption)}</div>` : '');
  } else if (type === 'voice') {
    contentHtml = buildVoicePlayer(data.content, data.duration || 0);
  }

  const authorHtml = !isOwn ? `<div class="msg-author">${escapeHtml(data.authorName || 'Аноним')}</div>` : '';
  const time = fmtTime(data.createdAt);
  const editedLabel = data.edited ? '<span class="msg-edited">ред.</span>' : '';

  let editBtn = '';
  if (isOwn && (type === 'text' || data.caption !== undefined)) {
    editBtn = `<button class="msg-edit-btn" onclick="startEdit('${msgId}',${type === 'text' ? 'false' : 'true'})" title="Редактировать">✏️</button>`;
  }

  div.innerHTML = `${avatarHtml}<div class="bubble">${authorHtml}${contentHtml}
    <div class="msg-meta">${editedLabel}<span class="msg-time">${time}</span>${editBtn}</div></div>`;
  return div;
}

function openImage(src) {
  imgViewerSrc.src = src;
  imgViewer.classList.add('show');
}

// ── Голосовой плеер ──
function buildVoicePlayer(src, dur) {
  const id = 'vp_' + genId();
  return `<div class="voice-player" id="${id}">
    <button class="vp-play" onclick="vpToggle('${id}')">▶</button>
    <div class="vp-bar-wrap" onclick="vpSeek(event,'${id}')">
      <div class="vp-bar"><div class="vp-fill"></div></div>
    </div>
    <span class="vp-time">${fmtDuration(dur)}</span>
    <audio src="${src}" preload="metadata"></audio>
  </div>`;
}

window.vpToggle = function(id) {
  const wrap = document.getElementById(id);
  if (!wrap) return;
  const audio = wrap.querySelector('audio');
  const btn = wrap.querySelector('.vp-play');
  const fill = wrap.querySelector('.vp-fill');
  const time = wrap.querySelector('.vp-time');

  if (audio.paused) {
    document.querySelectorAll('.voice-player audio').forEach(a => {
      if (a !== audio && !a.paused) { a.pause(); a.currentTime = 0; }
    });
    document.querySelectorAll('.vp-play').forEach(b => b.textContent = '▶');
    document.querySelectorAll('.vp-fill').forEach(f => f.style.width = '0%');

    audio.play();
    btn.textContent = '⏸';
    audio.ontimeupdate = () => {
      fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      time.textContent = fmtDuration(audio.currentTime);
    };
    audio.onended = () => {
      btn.textContent = '▶';
      fill.style.width = '0%';
      time.textContent = fmtDuration(audio.duration);
    };
  } else {
    audio.pause();
    btn.textContent = '▶';
  }
};

window.vpSeek = function(e, id) {
  const wrap = document.getElementById(id);
  const audio = wrap.querySelector('audio');
  const barWrap = wrap.querySelector('.vp-bar-wrap');
  const rect = barWrap.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  if (audio.duration) audio.currentTime = pct * audio.duration;
};

// ════════════════════════════════════════
// РЕДАКТИРОВАНИЕ
// ════════════════════════════════════════
let editingMsgId = null;
let editingIsCaption = false;

window.startEdit = function(msgId, isCaption) {
  editingMsgId = msgId;
  editingIsCaption = isCaption;

  if (!currentPageId) return;
  getMessagesRef(currentPageId).doc(msgId).get().then(doc => {
    if (!doc.exists) return;
    const d = doc.data();
    editText.value = isCaption ? (d.caption || '') : (d.content || '');
    editOverlay.classList.add('show');
    setTimeout(() => editText.focus(), 100);
  });
};

editSave.addEventListener('click', saveEdit);
editText.addEventListener('keydown', e => { if (e.key === 'Enter' && e.ctrlKey) saveEdit(); });
editCancel.addEventListener('click', () => editOverlay.classList.remove('show'));
editOverlay.addEventListener('click', e => { if (e.target === editOverlay) editOverlay.classList.remove('show'); });

function saveEdit() {
  if (!editingMsgId || !currentPageId) return;
  const val = editText.value.trim();
  const field = editingIsCaption ? 'caption' : 'content';
  getMessagesRef(currentPageId).doc(editingMsgId).update({
    [field]: val,
    edited: true,
    editedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    editOverlay.classList.remove('show');
  }).catch(err => {
    console.error('Edit error:', err);
    alert('Ошибка сохранения');
  });
}

// ════════════════════════════════════════
// ОТПРАВКА СООБЩЕНИЙ
// ════════════════════════════════════════
function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !currentPageId || !db) return;

  getMessagesRef(currentPageId).add({
    type: 'text',
    content: text,
    authorId: currentUser.id,
    authorName: currentUser.name,
    authorAvatar: currentUser.avatar,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    edited: false
  }).catch(err => console.error('Send error:', err));

  msgInput.value = '';
  msgInput.style.height = '40px';
  toggleSendVoice();
}

sendBtn.addEventListener('click', sendMessage);
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 140) + 'px';
  toggleSendVoice();
});

function toggleSendVoice() {
  const hasText = msgInput.value.trim().length > 0;
  sendBtn.style.display = hasText ? 'flex' : 'none';
  voiceBtn.style.display = hasText ? 'none' : 'flex';
}

// ── Файлы (фото/видео) ──
attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', handleFiles);

async function handleFiles(e) {
  const files = Array.from(e.target.files);
  if (!files.length || !currentPageId) return;

  for (const file of files) {
    try {
      if (file.type.startsWith('image/')) {
        const b64 = await compressImage(file);
        await getMessagesRef(currentPageId).add({
          type: 'image',
          content: b64,
          caption: '',
          authorId: currentUser.id,
          authorName: currentUser.name,
          authorAvatar: currentUser.avatar,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          edited: false
        });
      } else if (file.type.startsWith('video/')) {
        if (file.size > 700000) {
          alert('Видео слишком большое (макс ~700 КБ). Используйте короткие видео или загружайте как фото.');
          continue;
        }
        const b64 = await readFileAsBase64(file);
        await getMessagesRef(currentPageId).add({
          type: 'video',
          content: b64,
          caption: '',
          authorId: currentUser.id,
          authorName: currentUser.name,
          authorAvatar: currentUser.avatar,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          edited: false
        });
      }
    } catch (err) {
      console.error('File upload error:', err);
      alert('Ошибка загрузки файла');
    }
  }
  fileInput.value = '';
}

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

// ════════════════════════════════════════
// ЗАПИСЬ ГОЛОСОВЫХ
// ════════════════════════════════════════
let isRecording = false;

voiceBtn.addEventListener('click', async () => {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
});

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4']
      .find(t => MediaRecorder.isTypeSupported(t)) || '';

    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    audioChunks = [];
    recordingSeconds = 0;

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      sendVoice();
    };

    mediaRecorder.start();
    isRecording = true;

    // UI: показываем индикатор записи
    voiceBtn.classList.add('recording');
    voiceBtn.textContent = '⏹';
    msgInput.style.display = 'none';
    attachBtn.style.display = 'none';

    // Создаём индикатор
    const indicator = document.createElement('div');
    indicator.className = 'rec-indicator';
    indicator.id = 'recIndicator';
    indicator.innerHTML = `<div class="rec-dot"></div><span id="recTime">0:00</span><span>Запись...</span>`;
    inputArea.insertBefore(indicator, voiceBtn);

    recordingTimer = setInterval(() => {
      recordingSeconds++;
      const el = $('recTime');
      if (el) el.textContent = fmtDuration(recordingSeconds);
    }, 1000);

  } catch (err) {
    console.error('Mic error:', err);
    alert('Нет доступа к микрофону');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  clearInterval(recordingTimer);

  // UI: убираем индикатор
  voiceBtn.classList.remove('recording');
  voiceBtn.textContent = '🎤';
  msgInput.style.display = '';
  attachBtn.style.display = '';
  const ind = $('recIndicator');
  if (ind) ind.remove();
}

async function sendVoice() {
  if (!audioChunks.length || !currentPageId) return;
  const blob = new Blob(audioChunks, { type: audioChunks[0].type || 'audio/webm' });

  const reader = new FileReader();
  reader.onload = async () => {
    const b64 = reader.result;
    if (b64.length > 950000) {
      alert('Голосовое сообщение слишком длинное. Попробуйте записать короче.');
      return;
    }
    try {
      await getMessagesRef(currentPageId).add({
        type: 'voice',
        content: b64,
        duration: recordingSeconds,
        authorId: currentUser.id,
        authorName: currentUser.name,
        authorAvatar: currentUser.avatar,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        edited: false
      });
    } catch (err) {
      console.error('Voice send error:', err);
      alert('Ошибка отправки голосового');
    }
  };
  reader.readAsDataURL(blob);
}

// ── Мобильная навигация ──
chatBack.addEventListener('click', () => {
  chatArea.classList.remove('mob-open');
});

// ── Глобальные горячие клавиши ──

  if (e.key === 'Escape') {
    editOverlay.classList.remove('show');
    newPageOverlay.classList.remove('show');
    imgViewer.classList.remove('show');
  }

// ════════════════════════════════════════
// ИНИЦИАЛИЗАЦИЯ
// ════════════════════════════════════════
async function startApp() {
  loadTheme();

  if (loadProfile()) {
    showProfileUI();
    app.style.display = 'flex';
    avatarPreview.src = currentUser.avatar;
    await authFirebaseAndInit();
  } else {
    avatarPreview.src = makeDefaultAvatar('User');
    profileOverlay.classList.add('show');
  }

  // Проверка конфига
  if (!fbConfig.apiKey) {
    setTimeout(() => {
      alert('⚠️ Настройте Firebase!\n\nВставьте свои ключи в переменную firebaseConfig в начале <script>.');
    }, 500);
  }
}

startApp();
